name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      GTM_DATABASE: ${{ secrets.GTM_DATABASE }}
      MULTICA_DATABASE_URL: ${{ secrets.MULTICA_DATABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_PASSWORD,GTM_DATABASE,MULTICA_DATABASE_URL,NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY,NEXT_PUBLIC_SUPABASE_URL,PROJECT_DIR
          script: |
            set -e
            DEPLOY_DIR="${PROJECT_DIR}/dashboard"

            # Write secrets to .env
            {
              echo "NODE_ENV=production"
              echo "DB_PASSWORD=${DB_PASSWORD}"
              echo "GTM_DATABASE=${GTM_DATABASE}"
              echo "MULTICA_DATABASE_URL=${MULTICA_DATABASE_URL}"
              echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}"
              echo "NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}"
            } > "${DEPLOY_DIR}/.env"

            cd "${DEPLOY_DIR}"
            git pull origin main
            npm ci
            npm run build
            pm2 startOrReload ecosystem.config.js --update-env
