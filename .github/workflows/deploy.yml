name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      GTM_DATABASE: ${{ secrets.GTM_DATABASE }}
      MULTICA_DATABASE_URL: ${{ secrets.MULTICA_DATABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      CIA_HUB_TOKEN: ${{ secrets.CIA_HUB_TOKEN }}
      CIA_HUB_URL: ${{ secrets.CIA_HUB_URL }}
      PROJECT_DIR: ${{ secrets.PROJECT_DIR }}
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_PASSWORD,GTM_DATABASE,MULTICA_DATABASE_URL,NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY,NEXT_PUBLIC_SUPABASE_URL,CIA_HUB_TOKEN,CIA_HUB_URL,PROJECT_DIR
          script: |
            set -e
            DEPLOY_DIR="${PROJECT_DIR}/dashboard"

            # Clone repo if first deploy, otherwise pull
            if [ ! -d "${DEPLOY_DIR}/.git" ]; then
              ssh-keyscan github.com >> ~/.ssh/known_hosts
              git clone git@github.com:SolveaCX/gtm-swarm.git "${DEPLOY_DIR}"
            fi

            # Write secrets to .env
            {
              echo "NODE_ENV=production"
              echo "DB_PASSWORD=${DB_PASSWORD}"
              echo "GTM_DATABASE=${GTM_DATABASE}"
              echo "MULTICA_DATABASE_URL=${MULTICA_DATABASE_URL}"
              echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}"
              echo "NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}"
              echo "CIA_HUB_TOKEN=${CIA_HUB_TOKEN}"
              echo "CIA_HUB_URL=${CIA_HUB_URL}"
            } > "${DEPLOY_DIR}/.env"

            cd "${DEPLOY_DIR}"
            git pull origin main
            npm ci
            npm run build
            pm2 delete gtm-swarm 2>/dev/null || true
            pm2 start ecosystem.config.js
