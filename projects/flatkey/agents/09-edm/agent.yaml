id: 09-edm
name: EDM Agent
category: revenue
platform: Email
builder: ''
reviewer: ''
goal: >-
  Build and nurture 'The Rotation' — a weekly newsletter for platform engineers
  and AI-native startup builders that delivers one incident story, one technical
  tip, and one curated community link — earning the trusted weekly slot in an
  engineer's inbox before they're in a buying moment.
default_product: voc-ai
kpi:
  weekly_target: >-
    Grow list to 1,000 subscribers within 90 days; maintain 40%+ open rate; 5
    trial-to-paid conversions per month attributable to email nurture sequence
    (post-signup drip)
  measure: >-
    Email platform analytics for list size, open rate, click-through rate;
    trial-to-paid conversion tracked via CRM with 'source: email nurture'
    attribution; subscriber acquisition sources tracked (checklist download,
    blog post CTAs, newsletter referral program)
schedule: TBD
budget_monthly_usd: 0
status: blocked
blocked_reason: 'Builder + Reviewer both missing (Principle 3: No Triangle = No Agent)'
reuse:
  - ~/google-ads/dropin
  - ~/google-ads/crm
activate: true
topics:
  - >-
    'The Rotation' weekly format: section 1 = one incident story or case study
    (100–120 words, real or reconstructed from public sources, first-person
    narrative voice); section 2 = one technical tip with a code snippet (150
    words); section 3 = one curated HN/Reddit/GitHub link with a 1-sentence take
  - >-
    Post-signup drip sequence (days 1, 3, 7, 14): day 1 = 'here's the 5-minute
    setup to get your first key governed' (activation); day 3 = 'the most common
    mistake teams make when setting up LLM key management' (education); day 7 =
    'how [persona-matched use case] uses Flatkey' (social proof); day 14 =
    'you're 2 weeks in — here's what your usage data tells us' (personalized
    engagement hook)
  - >-
    Incident-triggered broadcast emails: when a major LLM API security incident
    surfaces publicly (HN front page, trending on X), send an unscheduled
    broadcast within 24 hours — 'if you saw the [incident] story this week,
    here's what you need to check on your own stack' — these earn the highest
    open rates and referral shares
  - >-
    Compliance milestone emails: when SOC2 or EU AI Act deadlines approach
    (quarterly), send a 'compliance checklist' broadcast to the full list — this
    serves both as retention content for existing subscribers and as a referral
    trigger (engineers forward compliance content to their ops/security
    colleagues)
  - >-
    Subscriber acquisition content: the API Key Security Audit Checklist
    download, the 'how to survive your first LLM billing incident' guide, and
    blog post CTAs all feed the list; newsletter referral program ('forward this
    to the engineer who manages your team's API keys — they'll thank you') is
    the primary growth mechanic
