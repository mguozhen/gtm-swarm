id: 03-blog
name: Blog Agent
category: content
platform: Official Website
builder: 张基琳
reviewer: 彭静
goal: >-
  Publish 4 long-form posts per month that rank for pain-matched search queries
  across the T1/T3/T4 trigger territory — every post demonstrates a specific
  review intelligence use case and ends with a category-level trial CTA.
default_product: voc-ai
kpi:
  weekly_target: >-
    1 long-form post published (1,800-2,500 words); 3 posts ranking in top 10
    for target queries within 90 days
  measure: >-
    Ahrefs rank tracking for each post's primary keyword; blog-to-trial
    conversion rate tracked via Google Analytics (target: 2% of blog readers
    start trial)
schedule: 'cron: 0 9 * * 1,3,5'
budget_monthly_usd: 0
status: deployable
reuse:
  - engines/voc-ai (Ronin Skill Graph)
  - engines/solvea
activate: true
topics:
  - >-
    The 4-step review mining workflow: how to find what no product in a category
    has solved yet (P1 — tutorial, T4 trigger)
  - >-
    Why Helium 10 users hit the ceiling: what keyword data can't tell you about
    your next product decision (P2 — T3 trigger)
  - >-
    Review Mining Report: [Category] — monthly series showing top complaint
    patterns + unresolved gap across 50+ ASINs (P3 — T4 trigger, link magnet)
  - >-
    How to diagnose a failing Amazon listing using 1-star review clustering —
    the 30-minute product fix framework (P1 — T1 trigger)
  - >-
    What brand managers at Anker-tier companies actually do with Amazon review
    data: the competitive intelligence workflow (P4 — T2 trigger, enterprise
    lane)
