id: 05-video
name: Video Agent
category: content
platform: YouTube · TikTok
builder: 张基琳
reviewer: 庄可欣
goal: >-
  Build a YouTube presence that captures high-intent FBA sellers and brand
  managers through workflow tutorials and comparison videos — with Shorts
  feeding discovery and long-form building the trust that converts viewers into
  trial users.
default_product: voc-ai
kpi:
  weekly_target: 1-2 YouTube Shorts published; 2 long-form videos published per month
  measure: >-
    Trial link clicks from YouTube (tracked via UTM in description); target 500
    total trial clicks from YouTube within 6 months; 1 long-form video ≥1,000
    views within 30 days of publish by month 4
schedule: 'cron: 0 14 * * *'
budget_monthly_usd: 0
status: deployable
reuse:
  - ~/MKT/MoneyPrinterTurbo
  - ~/MKT/ShortGPT
  - ~/MKT/CosyVoice
  - ~/autopost.video
activate: true
topics:
  - >-
    How to find untapped product opportunities using Amazon reviews: [category]
    case study walkthrough — screen-record tutorial of category-level complaint
    clustering (P3, T4)
  - >-
    Why I use Helium 10 AND VOC AI: what each tool actually tells me about a
    product — comparison walkthrough showing complementary use case (P2, T3)
  - >-
    The 30-minute bad launch diagnosis: how to use 1-star reviews to find
    exactly what's broken in your listing — step-by-step workflow (P1, T1)
  - >-
    What 8,000 Amazon reviews in [category] told me about the next product
    opportunity — Short format, 45 seconds, surprise data reveal (P3, T4)
  - >-
    How brand managers at major electronics brands use competitor review data
    before a product launch — narrative case study format (P4, T2)
