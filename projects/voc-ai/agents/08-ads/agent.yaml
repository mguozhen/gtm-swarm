id: 08-ads
name: Ads Agent
category: revenue
platform: Google · iOS · Android
builder: 高博远
reviewer: ''
goal: >-
  Capture the highest-intent trigger-matched search queries (Helium 10
  alternative seekers, review analysis tool seekers, bad launch diagnosers) with
  paid search, and retarget blog + category report visitors who didn't convert
  to trial — keeping CAC at or below $50 per qualified trial.
default_product: solvea
kpi:
  weekly_target: >-
    2 new ad variants A/B tested per week; 25 trial signups per week from paid
    by month 4
  measure: >-
    Trial signups per channel tracked in GA4 with UTM; CAC calculated as ad
    spend / trial signups; target $50 CAC or less; track trial-to-paid
    conversion rate from paid-acquired trials separately (target ≥20% within 30
    days)
schedule: always-on
budget_monthly_usd: 0
status: blocked
blocked_reason: 'Reviewer missing (Principle 3: No Triangle = No Agent)'
reuse:
  - ~/google-ads (Google Ads Sprint stack — most mature reuse)
  - ~/.ads-skill/tokens.json (OAuth)
activate: true
topics:
  - >-
    Google Search — T3 intent: 'helium 10 alternative', 'helium 10 review
    analytics', 'amazon review analysis tool', 'beyond keyword research amazon'
    — direct to comparison landing page
  - >-
    Google Search — T1 intent: 'how to analyze amazon 1 star reviews', 'why is
    my amazon product getting bad reviews', 'amazon review clustering tool' —
    direct to P1 blog post or free trial
  - >-
    Google Search — T4 intent: 'find product opportunities amazon reviews',
    'amazon review mining tool', 'product gap finder amazon' — direct to
    category report page or trial
  - >-
    Retargeting — blog readers who didn't convert: show category report for
    their visited category + 'See what VOC AI found in your category' CTA
  - >-
    LinkedIn Ads — T2/T5 intent for secondary ICP: job title targeting (Amazon
    Brand Manager, Head of Product, Consumer Insights Lead) at companies
    100-2000 employees — show Anker/Panasonic social proof + competitor
    benchmarking use case
