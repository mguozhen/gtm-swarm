goal: >-
  Convert trial users to paid subscribers through a 30-day nurture sequence that
  delivers category-specific review intelligence, teaches the review mining
  workflow one step at a time, and makes the category-level aha moment
  unavoidable — targeting 35% trial-to-paid conversion.
default_product: voc-ai
kpi:
  weekly_target: >-
    1 nurture email sent to active trial segment; 1 re-engagement email to
    dormant trial segment; weekly tip email to subscriber list
  measure: >-
    Trial-to-paid conversion rate tracked per cohort (30-day window); target
    35%; email open rate target 40%; click-to-trial-activation rate target 15%
    per email
schedule: TBD
budget_monthly_usd: 0
status: blocked
blocked_reason: 'Builder + Reviewer both missing (Principle 3: No Triangle = No Agent)'
reuse:
  - ~/google-ads/dropin
  - ~/google-ads/crm
activate: true
topics:
  - >-
    Welcome sequence Day 1: 'The one thing to do first in VOC AI' — route
    directly to category-level view, not single-ASIN; include a pre-built
    category example relevant to their signup context
  - >-
    Nurture Day 3: 'How to read a complaint cluster: what the percentage
    actually means for your product decision' — mini workflow tutorial with
    screenshot
  - >-
    Nurture Day 7: 'The review data Helium 10 downloads but doesn't analyze —
    here's what to do with it' — bridges T3 trigger to VOC AI use case
  - >-
    Nurture Day 14: Category report for the trial user's stated category of
    interest — 'Here's what we found in [their category]: the top 5 complaint
    patterns and the one gap no product has solved'
  - >-
    Re-engagement Day 21 (for inactive trials): 'You signed up 3 weeks ago.
    Here's the one thing most trial users miss — and why it changes what you see
    in the product'
